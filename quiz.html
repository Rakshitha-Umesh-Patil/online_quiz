<!DOCTYPE html>
<html>
<head>
    <title>Online Quiz</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h2 id="question">Loading...</h2>
    <div id="options"></div>
    <button id="nextBtn" style="display:none;">Next</button>
</div>

<script>
let questions = [];
let current = 0;
let score = 0;
let selected = null;

const qBox = document.getElementById("question");
const optBox = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");

// ✅ Check login session
const username = localStorage.getItem("username");
if(!username){
    alert("Please login first");
    window.location.href = "index.html";
}

// ✅ Load questions from PHP
fetch("php/get_questions.php")
.then(res => res.json())
.then(data => {
    questions = data;
    loadQuestion();
})
.catch(() => {
    qBox.innerText = "Failed to load questions.";
});

// ✅ Load question
function loadQuestion(){
    if(current >= questions.length){
        finishQuiz();
        return;
    }

    selected = null;
    nextBtn.style.display = "none";

    const q = questions[current];
    qBox.innerText = q.question;
    optBox.innerHTML = "";

    q.options.forEach((opt, index)=>{
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "optionBtn";

        btn.onclick = ()=>{
            selected = index;
            document.querySelectorAll(".optionBtn")
                .forEach(b => b.classList.remove("selected"));

            btn.classList.add("selected");
            nextBtn.style.display = "block";
        };

        optBox.appendChild(btn);
    });
}

// ✅ Next button
nextBtn.onclick = ()=>{
    if(selected === null){
        alert("Please select an option");
        return;
    }

    if(selected === questions[current].correct){
        score++;
    }

    current++;
    loadQuestion();
};

// ✅ Finish quiz → save score → go to result.html
function finishQuiz(){

    fetch('php/submit_score.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: `username=${encodeURIComponent(username)}&score=${score}`
    })
    .then(res => res.text())
    .then(response => {
        console.log(response); // should print "success"
        window.location.href = "result.html?score=" + score;
    })
    .catch(() => {
        alert("Error saving score.");
    });
}
</script>

</body>
</html>
