<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login / Register</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="box">
    <h2 id="formTitle">Login</h2>

    <!-- LOGIN FORM -->
    <form id="loginForm">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p class="link" id="toRegister">New user? Register</p>

    <!-- REGISTER FORM -->
    <form id="registerForm" style="display:none;">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <p class="link" id="toLogin" style="display:none;">Already user? Login</p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const toRegister = document.getElementById('toRegister');
    const toLogin = document.getElementById('toLogin');
    const formTitle = document.getElementById('formTitle');

    // Toggle Forms
    toRegister.onclick = () => {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
        toRegister.style.display = 'none';
        toLogin.style.display = 'block';
        formTitle.innerText = "Register";
    };

    toLogin.onclick = () => {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        toRegister.style.display = 'block';
        toLogin.style.display = 'none';
        formTitle.innerText = "Login";
    };

    // REGISTER
    registerForm.addEventListener('submit', function(e){
        e.preventDefault();

        fetch('php/register.php', {
            method: 'POST',
            body: new FormData(registerForm)
        })
        .then(res => res.text())
        .then(msg => {
            alert(msg);
            toLogin.click();
        });
    });

    // LOGIN  ✅ IMPORTANT FIX
    loginForm.addEventListener('submit', function (e) {
        e.preventDefault();

        fetch('php/login.php', {
            method: 'POST',
            body: new FormData(loginForm)
        })
        .then(res => res.json())   // ⚠️ expect JSON now
        .then(data => {
            if (data.status === 'success') {

                // ✅ store REAL username from DB
                localStorage.setItem('username', data.username);

                localStorage.removeItem('subject');
                window.location.href = 'subject.html';

            } else {
                alert(data.message);
            }
        });
    });

});
</script>

</body>
</html>
